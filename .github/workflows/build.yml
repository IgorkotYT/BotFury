name: BotFury CI/CD

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          pip install flask requests pytest

      - name: Run Python tests
        run: |
          cd flask-dashboard
          pytest -v

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Make scripts executable
        run: chmod +x binaries/*.sh

      - name: Unpack binaries
        run: ./binaries/unpack_all.sh

      - name: Grant execute permission for gradlew
        run: chmod +x minecraft-bots/botfury-mod/gradlew

      - name: Build with Gradle and test
        run: |
          cd minecraft-bots/botfury-mod
          ./gradlew build test

      - name: Verify build artifact
        run: |
          if [ ! -f "minecraft-bots/botfury-mod/build/libs/botfury-0.1.0.jar" ]; then
            echo "Build failed: JAR not found"
            exit 1
          fi

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: botfury-jar
          path: minecraft-bots/botfury-mod/build/libs/botfury-0.1.0.jar

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: botfury-jar
          path: .

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: botfury-0.1.0.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
