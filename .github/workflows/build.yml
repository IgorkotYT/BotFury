name: BotFury CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Make scripts executable
        run: chmod +x binaries/*.sh

      - name: Unpack binaries
        run: ./binaries/unpack_all.sh

      - name: Grant execute permission for gradlew
        run: chmod +x minecraft-bots/botfury-mod/gradlew

      - name: Build with Gradle
        run: |
          cd minecraft-bots/botfury-mod
          ./gradlew build

      - name: Verify build artifact
        run: |
          if [ ! -f "minecraft-bots/botfury-mod/build/libs/botfury-0.1.0.jar" ]; then
            echo "Build failed: JAR not found"
            exit 1
          fi

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: botfury-jar
          path: minecraft-bots/botfury-mod/build/libs/botfury-0.1.0.jar

  release:
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: botfury-jar
          path: .

      - name: Upload to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: botfury-0.1.0.jar
          asset_name: botfury-0.1.0.jar
          asset_content_type: application/java-archive
